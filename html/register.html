<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ميديكل هاب | إنشاء حساب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="home.html" class="nav-logo">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 14H8v-2h4v2zm3-4H8v-2h7v2zm0-4H8V7h7v2z"/></svg>
        </div>
        <span class="nav-logo-text">ميديكل<span>هاب</span></span>
      </a>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-outline">تسجيل الدخول</a>
      </div>
    </div>
  </nav>

  <!-- AUTH LAYOUT -->
  <main class="auth-layout">

    <!-- Right form panel -->
    <div class="auth-panel">
      <div class="auth-card fade-up" id="registerCard">
        <div class="auth-card-header">

          <!-- لوجو مصغر داخل الكارد -->
          <div class="card-logo">
            <div class="card-logo-icon">
              <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 14H8v-2h4v2zm3-4H8v-2h7v2zm0-4H8V7h7v2z"/></svg>
            </div>
            <span class="card-logo-text">ميديكل<span>هاب</span></span>
          </div>

          <h1 class="auth-title">إنشاء حساب جديد</h1>
          <p class="auth-subtitle">أدخل بياناتك لإنشاء حسابك</p>
        </div>

        <div id="reg-error"   class="alert alert-error"   style="display:none;"></div>
        <div id="reg-success" class="alert alert-success" style="display:none;"></div>

        <div class="auth-form" id="registerForm">

          <!-- Name row -->
          <div class="form-cols-3">
            <div class="form-group" id="fg-fname">
              <label class="form-label" for="fname">الاسم الأول</label>
              <div class="input-wrap">
                <input type="text" id="fname" class="form-input" placeholder="أحمد" autocomplete="given-name" />
              </div>
              <span class="form-error"></span>
            </div>
            <div class="form-group" id="fg-mname">
              <label class="form-label" for="mname">الاسم الثاني</label>
              <div class="input-wrap">
                <input type="text" id="mname" class="form-input" placeholder="محمد" />
              </div>
              <span class="form-error"></span>
            </div>
            <div class="form-group" id="fg-lname">
              <label class="form-label" for="lname">الاسم الثالث</label>
              <div class="input-wrap">
                <input type="text" id="lname" class="form-input" placeholder="علي" autocomplete="family-name" />
              </div>
              <span class="form-error"></span>
            </div>
          </div>

          <!-- Email -->
          <div class="form-group" id="fg-reg-email">
            <label class="form-label" for="reg-email">البريد الإلكتروني</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              </span>
              <input type="email" id="reg-email" class="form-input" placeholder="example@email.com" autocomplete="email" />
              <span class="input-status"></span>
            </div>
            <span class="form-error"></span>
          </div>

          <!-- Phone -->
          <div class="form-group" id="fg-phone">
            <label class="form-label" for="phone">رقم الهاتف المصري</label>
            <div class="input-wrap input-wrap-phone">
              <span class="phone-prefix">+20</span>
              <input type="tel" id="phone" class="form-input" placeholder="01xxxxxxxxx" maxlength="11" autocomplete="tel" />
              <span class="input-status"></span>
            </div>
            <span class="form-error"></span>
          </div>

          <!-- Role -->
          <div class="form-group" id="fg-role">
            <label class="form-label">نوع الحساب</label>
            <div class="role-toggle">
              <input type="radio" name="role" id="role-student" value="student" checked />
              <label for="role-student" class="role-btn">
                <span class="role-icon">🎓</span>
                <span class="role-text">طالب</span>
              </label>
              <input type="radio" name="role" id="role-instructor" value="instructor" />
              <label for="role-instructor" class="role-btn">
                <span class="role-icon">🏫</span>
                <span class="role-text">منشئ محتوى</span>
              </label>
            </div>
            <span class="form-error"></span>
          </div>

          <!-- Password -->
          <div class="form-group" id="fg-reg-password">
            <label class="form-label" for="reg-password">كلمة المرور</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
              </span>
              <input type="password" id="reg-password" class="form-input" placeholder="••••••••••••" autocomplete="new-password" />
              <button type="button" class="toggle-pw" id="toggleRegPw" aria-label="إظهار كلمة المرور">
                <svg class="eye-show" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <svg class="eye-hide" viewBox="0 0 24 24" style="display:none"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78 3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
              </button>
            </div>
            <!-- Password strength -->
            <div class="pw-strength" id="pwStrength" style="display:none;">
              <div class="pw-bars">
                <div class="pw-bar" id="pwBar1"></div>
                <div class="pw-bar" id="pwBar2"></div>
                <div class="pw-bar" id="pwBar3"></div>
                <div class="pw-bar" id="pwBar4"></div>
              </div>
              <span class="pw-label" id="pwLabel"></span>
            </div>
            <div class="pw-rules" id="pwRules">
              <div class="pw-rule" id="rule-len"><span class="rule-dot"></span> أكثر من ١٠ أحرف وأرقام</div>
              <div class="pw-rule" id="rule-upper"><span class="rule-dot"></span> حرف كبير واحد على الأقل (A-Z)</div>
              <div class="pw-rule" id="rule-letter"><span class="rule-dot"></span> يحتوي على رمز خاص (!@#$%^&* إلخ)</div>
            </div>
            <span class="form-error"></span>
          </div>

          <!-- Confirm Password -->
          <div class="form-group" id="fg-reg-confirm">
            <label class="form-label" for="reg-confirm">تأكيد كلمة المرور</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
              </span>
              <input type="password" id="reg-confirm" class="form-input" placeholder="••••••••••••" autocomplete="new-password" />
              <button type="button" class="toggle-pw" id="toggleConfirmPw" aria-label="إظهار كلمة المرور">
                <svg class="eye-show" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <svg class="eye-hide" viewBox="0 0 24 24" style="display:none"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78 3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
              </button>
            </div>
            <span class="form-error"></span>
          </div>

          <button type="button" class="btn btn-primary btn-block" id="registerBtn">
            <span class="btn-text">إنشاء الحساب</span>
            <span class="btn-spinner" style="display:none;">
              <svg viewBox="0 0 24 24" class="spin"><path d="M12 4V2A10 10 0 0 0 2 12h2a8 8 0 0 1 8-8z"/></svg>
            </span>
          </button>

          <p class="auth-switch">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
        </div>
      </div>

      <!-- OTP CARD (hidden initially) -->
      <div class="auth-card fade-up" id="otpCard" style="display:none;">
        <div class="auth-card-header">
          <div class="otp-email-icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </div>
          <h1 class="auth-title">تحقق من بريدك</h1>
          <p class="auth-subtitle">أرسلنا كود مكون من ٦ أرقام إلى<br/><strong id="otpEmailDisplay"></strong></p>
        </div>

        <div id="otp-error"   class="alert alert-error"   style="display:none;"></div>
        <div id="otp-success" class="alert alert-success" style="display:none;"></div>

        <div class="otp-inputs" id="otpInputs">
          <input type="text" maxlength="1" class="otp-input" inputmode="numeric" pattern="[0-9]" />
          <input type="text" maxlength="1" class="otp-input" inputmode="numeric" pattern="[0-9]" />
          <input type="text" maxlength="1" class="otp-input" inputmode="numeric" pattern="[0-9]" />
          <input type="text" maxlength="1" class="otp-input" inputmode="numeric" pattern="[0-9]" />
          <input type="text" maxlength="1" class="otp-input" inputmode="numeric" pattern="[0-9]" />
          <input type="text" maxlength="1" class="otp-input" inputmode="numeric" pattern="[0-9]" />
        </div>

        <button type="button" class="btn btn-primary btn-block" id="verifyOtpBtn">
          <span class="btn-text">تفعيل الحساب</span>
          <span class="btn-spinner" style="display:none;">
            <svg viewBox="0 0 24 24" class="spin"><path d="M12 4V2A10 10 0 0 0 2 12h2a8 8 0 0 1 8-8z"/></svg>
          </span>
        </button>

        <p class="otp-resend">لم يصلك الكود؟ <button type="button" id="resendOtp" class="link-btn">إعادة الإرسال</button></p>
        <p class="otp-resend"><button type="button" id="backToRegister" class="link-btn">← تغيير البريد الإلكتروني</button></p>
      </div>

    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script>
    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
    });
    initRegisterPage();
  </script>
</body>
</html>
